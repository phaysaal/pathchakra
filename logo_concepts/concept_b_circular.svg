<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circular arcs connecting dots (radius 190, center 256,256) -->
  <path d="M 256,66 A 190,190 0 0,1 420,161" fill="none" stroke="#2E7D32" stroke-width="5" opacity="0.4"/>
  <path d="M 420,161 A 190,190 0 0,1 420,351" fill="none" stroke="#2E7D32" stroke-width="5" opacity="0.4"/>
  <path d="M 420,351 A 190,190 0 0,1 256,446" fill="none" stroke="#2E7D32" stroke-width="5" opacity="0.4"/>
  <path d="M 256,446 A 190,190 0 0,1 92,351" fill="none" stroke="#2E7D32" stroke-width="5" opacity="0.4"/>
  <path d="M 92,351 A 190,190 0 0,1 92,161" fill="none" stroke="#2E7D32" stroke-width="5" opacity="0.4"/>
  <path d="M 92,161 A 190,190 0 0,1 256,66" fill="none" stroke="#2E7D32" stroke-width="5" opacity="0.4"/>

  <!-- Inner star connections -->
  <line x1="256" y1="66"  x2="256" y2="446" stroke="#43A047" stroke-width="2.5" opacity="0.2"/>
  <line x1="92"  y1="161" x2="420" y2="351" stroke="#43A047" stroke-width="2.5" opacity="0.2"/>
  <line x1="420" y1="161" x2="92"  y2="351" stroke="#43A047" stroke-width="2.5" opacity="0.2"/>

  <!-- Student dots -->
  <circle cx="420" cy="161" r="28" fill="#43A047" opacity="0.75"/>
  <circle cx="420" cy="351" r="28" fill="#43A047" opacity="0.75"/>
  <circle cx="256" cy="446" r="28" fill="#43A047" opacity="0.75"/>
  <circle cx="92"  cy="351" r="28" fill="#43A047" opacity="0.75"/>
  <circle cx="92"  cy="161" r="28" fill="#43A047" opacity="0.75"/>

  <!-- Teacher dot — top center, larger -->
  <circle cx="256" cy="66" r="48" fill="url(#g1)"/>
  <circle cx="256" cy="66" r="24" fill="white" opacity="0.2"/>
</svg>
