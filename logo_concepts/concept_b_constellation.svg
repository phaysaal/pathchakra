<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Connection lines forming a cycle -->
  <line x1="256" y1="96"  x2="400" y2="200" stroke="#43A047" stroke-width="4" opacity="0.5"/>
  <line x1="400" y1="200" x2="370" y2="370" stroke="#43A047" stroke-width="4" opacity="0.5"/>
  <line x1="370" y1="370" x2="210" y2="410" stroke="#43A047" stroke-width="4" opacity="0.5"/>
  <line x1="210" y1="410" x2="120" y2="290" stroke="#43A047" stroke-width="4" opacity="0.5"/>
  <line x1="120" y1="290" x2="160" y2="160" stroke="#43A047" stroke-width="4" opacity="0.5"/>
  <line x1="160" y1="160" x2="256" y2="96"  stroke="#43A047" stroke-width="4" opacity="0.5"/>

  <!-- Cross connections — inner web -->
  <line x1="256" y1="96"  x2="210" y2="410" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <line x1="400" y1="200" x2="120" y2="290" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <line x1="160" y1="160" x2="370" y2="370" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>

  <!-- Student dots — smaller -->
  <circle cx="400" cy="200" r="14" fill="#43A047" opacity="0.8"/>
  <circle cx="370" cy="370" r="14" fill="#43A047" opacity="0.8"/>
  <circle cx="210" cy="410" r="14" fill="#43A047" opacity="0.8"/>
  <circle cx="120" cy="290" r="14" fill="#43A047" opacity="0.8"/>
  <circle cx="160" cy="160" r="14" fill="#43A047" opacity="0.8"/>

  <!-- Teacher dot — larger, at top, darker -->
  <circle cx="256" cy="96" r="24" fill="url(#grad)"/>
  <circle cx="256" cy="96" r="12" fill="white" opacity="0.3"/>
</svg>
